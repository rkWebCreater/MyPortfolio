<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品詳細ページ</title>
  <link rel="stylesheet" href="css/detail.css"> <!-- あなたの既存のCSS -->
</head>
<body>

  <!-- メインコンテンツの外枠 -->
  <main class="detail-main">
    <div class="container">

      <!-- 作品の詳細エリア -->
      <article id="product-detail">
        
        <div class="detail-grid">
          <!-- 2. 作品のメイン画像 -->
          <div class="detail-thumb">
            <!-- 1. 作品タイトル（読み込み中は一時的に文字を表示） -->
            <h1 id="detail-title" class="main-title">作品を読み込み中...</h1>
            <img id="detail-img" src="" alt="">
          </div>
          
          <!-- 3. 作品のテキスト情報 -->
          <div class="detail-info">
            
            <!-- 説明文 -->
            <div class="info-block">
              <h2>作品について</h2>
              <p id="detail-description"></p>
              <a href="/index.html#proTtl" id="backBtn">作品一覧に戻る</a>
            </div>
            <img id="mainImg" src="" alt="">
            

          </div>
        </div>

      </article>

    </div>
  </main>
  <footer class="slide">
   <div class="slide_track">
    <ul class="footer_section slider-list"  id="other-product-list">
    <!-- その他の作品を表示させる -->
    </ul>
   </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <!--  詳細ページ専用のJavaScriptを読み込む　-->
  <script src="js/detail.js"></script>

</body>
</html>
